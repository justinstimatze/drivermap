<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drivermap Explorer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;--surface:#fff;--border:#e5e5e5;--text:#1a1a1a;
  --text2:#666;--text3:#999;--accent:#4a90d9;
  --neutral-bg:#f0f0f0;--pos-bg:#e8f5e9;--neg-bg:#e3f2fd;
  --pos:#2e7d32;--neg:#1565c0;--neutral:#888;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --mono:"SF Mono",Monaco,Consolas,"Liberation Mono",monospace;
  --radius:6px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);
  font-size:14px;line-height:1.5;min-height:100vh}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.header .meta{font-size:13px;color:var(--text2)}

/* Layout */
.container{display:flex;max-width:1400px;margin:0 auto;padding:12px;gap:12px;
  min-height:calc(100vh - 56px)}
.sidebar{width:320px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;
  position:sticky;top:68px;align-self:flex-start;max-height:calc(100vh - 80px);
  overflow-y:auto}
.results{flex:1;min-width:0}

/* Panels */
.panel{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden}
.panel-header{padding:10px 14px;font-size:12px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);
  border-bottom:1px solid var(--border);display:flex;justify-content:space-between;
  align-items:center}
.panel-header{cursor:pointer}
.panel-header .reset{font-size:11px;text-transform:none;letter-spacing:0;
  color:var(--accent);cursor:pointer;font-weight:500}
.panel-header .reset:hover{text-decoration:underline}
.panel-header .arrow{font-size:10px;margin-right:4px;display:inline-block;
  transition:transform 0.15s ease}
.panel.collapsed .arrow{transform:rotate(-90deg)}
.panel-body{padding:8px 14px;max-height:calc((100vh - 360px) / 3);overflow-y:auto}
.panel.collapsed .panel-body,.panel.collapsed .domain-legend{display:none}

/* Dimension toggles */
.dim-group{margin-bottom:6px}
.dim-row{display:flex;align-items:center;padding:3px 0;gap:8px}
.dim-label{flex:1;font-size:12.5px;color:var(--text);cursor:default;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dim-label:hover{color:var(--accent)}
.dim-toggle{width:44px;height:22px;border-radius:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:11px;
  font-weight:700;user-select:none;transition:all 0.15s ease;flex-shrink:0;
  border:1.5px solid var(--border)}
.dim-toggle[data-state="0"]{background:var(--neutral-bg);color:var(--neutral)}
.dim-toggle[data-state="+"]{background:var(--pos-bg);color:var(--pos);
  border-color:var(--pos)}
.dim-toggle[data-state="-"]{background:var(--neg-bg);color:var(--neg);
  border-color:var(--neg)}

/* Situation checkboxes */
.feat-row{display:flex;align-items:center;padding:3px 0;gap:8px}
.feat-row label{flex:1;font-size:12.5px;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feat-row input[type="checkbox"]{width:15px;height:15px;cursor:pointer;
  accent-color:var(--accent);flex-shrink:0}

/* Results */
.results-header{padding:12px 16px;display:flex;justify-content:space-between;
  align-items:center;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:8px}
.results-header h2{font-size:14px;font-weight:600}
.results-count{font-size:12px;color:var(--text2)}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:40px;margin-bottom:12px;opacity:0.4}
.empty-state p{font-size:14px;max-width:320px;margin:0 auto}

/* Result cards */
.result-card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:6px;cursor:pointer;
  transition:border-color 0.15s ease}
.result-card:hover{border-color:#ccc}
.result-card.expanded{border-color:var(--accent)}
.result-main{padding:10px 14px;display:flex;align-items:center;gap:12px}
.result-rank{font-size:13px;color:var(--text3);font-weight:600;min-width:22px;
  text-align:right}
.result-info{flex:1;min-width:0}
.result-name{font-size:14px;font-weight:600;margin-bottom:2px}
.result-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}

/* Bar */
.result-bar-wrap{width:140px;flex-shrink:0;display:flex;align-items:center;gap:8px}
.result-bar{flex:1;height:8px;border-radius:4px;background:var(--neutral-bg);
  overflow:hidden;display:flex}
.result-bar .seg-person{height:100%;border-radius:4px 0 0 4px;opacity:0.85}
.result-bar .seg-situation{height:100%;opacity:0.45}
.result-score{font-size:13px;font-weight:700;min-width:36px;text-align:right;
  font-variant-numeric:tabular-nums}

/* Chips */
.chip{display:inline-block;font-size:10.5px;padding:1px 7px;border-radius:10px;
  font-weight:500;line-height:1.6}
.chip-domain{color:#fff;opacity:0.85}
.chip-dim-pos{background:var(--pos-bg);color:var(--pos)}
.chip-dim-neg{background:var(--neg-bg);color:var(--neg)}
.chip-dim-mixed{background:var(--neutral-bg);color:var(--neutral)}
.chip-feat{background:#e0f2f1;color:#00695c}
.chip-feat-damp{background:#eceff1;color:#546e7a}

/* Expanded detail */
.result-detail{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.result-card.expanded .result-detail{display:block}
.detail-section{margin-top:10px}
.detail-section h4{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;
  color:var(--text3);margin-bottom:4px}
.plo-list{list-style:none;padding:0}
.plo-list li{font-size:12.5px;color:var(--text2);padding:2px 0;padding-left:12px;
  position:relative}
.plo-list li::before{content:"·";position:absolute;left:0;color:var(--text3)}

/* Verbalization */
.verb-section{margin-top:12px;background:#fafafa;border:1px solid var(--border);
  border-radius:var(--radius);padding:12px}
.verb-section h4{margin-bottom:8px}
.verb-prompt{padding:10px;background:#fff;border:1px solid var(--border);
  border-radius:var(--radius);font-family:var(--mono);font-size:11.5px;
  line-height:1.5;white-space:pre-wrap;color:var(--text2);max-height:320px;
  overflow-y:auto}

/* Domain legend */
.domain-legend{display:flex;flex-wrap:wrap;gap:6px;padding:8px 14px}
.domain-chip{font-size:10.5px;padding:2px 8px;border-radius:10px;color:#fff;
  opacity:0.8;cursor:pointer;transition:opacity 0.15s}
.domain-chip:hover,.domain-chip.active{opacity:1}

/* Responsive */
@media(max-width:900px){
  .container{flex-direction:column}
  .sidebar{width:100%;position:static;max-height:none}
  .panel-body{max-height:40vh}
}
</style>
</head>
<body>

<div class="header">
  <h1>Drivermap Explorer</h1>
  <span class="meta">137 mechanisms &middot; 28 dimensions &middot; 19 situation features</span>
</div>

<div class="container">
  <div class="sidebar">
    <!-- Trait dimensions -->
    <div class="panel" id="panel-trait">
      <div class="panel-header" onclick="togglePanel('panel-trait', event)">
        <span><span class="arrow">&#9660;</span>Trait Dimensions</span>
        <span class="reset" onclick="resetDims('trait')">Reset</span>
      </div>
      <div class="panel-body" id="trait-dims"></div>
    </div>

    <!-- State dimensions -->
    <div class="panel" id="panel-state">
      <div class="panel-header" onclick="togglePanel('panel-state', event)">
        <span><span class="arrow">&#9660;</span>State Dimensions</span>
        <span class="reset" onclick="resetDims('state')">Reset</span>
      </div>
      <div class="panel-body" id="state-dims"></div>
    </div>

    <!-- Situation features -->
    <div class="panel" id="panel-sit">
      <div class="panel-header" onclick="togglePanel('panel-sit', event)">
        <span><span class="arrow">&#9660;</span>Situation Features</span>
        <span class="reset" onclick="resetFeats()">Reset</span>
      </div>
      <div class="panel-body" id="sit-feats"></div>
    </div>

    <!-- Domain legend -->
    <div class="panel" id="panel-domains">
      <div class="panel-header" onclick="togglePanel('panel-domains', event)">
        <span><span class="arrow">&#9660;</span>Domains</span>
      </div>
      <div class="domain-legend" id="domain-legend"></div>
    </div>
  </div>

  <div class="results" id="results-area">
    <div class="results-header">
      <h2>Predictions</h2>
      <span class="results-count" id="results-count"></span>
    </div>
    <div id="results-list"></div>
  </div>
</div>

const MECHS = [{"id":"achievement_motivation","name":"Achievement motivation (need for achievement)","domain":"individual_variation","description":"A person's enduring desire for significant accomplishment, mastery of skills, and meeting high standards of performance; characterized by a consistent concern with improving one's performance and succeeding in competition.","plo":["wants to win","sets high goals","takes on challenges","seeks mastery","pushes harder","takes risks","avoids hard tasks","makes excuses","plays it safe"],"narrative":["achievement drive active \u2014 evaluative attention preferentially allocated to performance metrics and personal-best benchmarks over social or affiliative outcomes","mastery-orientation engaged \u2014 task difficulty calibrated toward moderate challenge; perceived-too-easy tasks trigger disengagement, perceived-impossible tasks trigger avoidance","effort-attribution schema dominant \u2014 success and failure outcomes routed through personal-agency attributions, sustaining persistence under setback and amplifying ownership of outcomes","progress-monitoring hypervigilance \u2014 internal goal-tracking runs continuously, generating urgency signals when the gap between current and target performance widens","feedback-seeking drive elevated \u2014 evaluative information about performance quality actively prioritized and solicited; negative feedback processed as corrective data rather than social threat"],"accuracy":0.93},{"id":"alcohol_myopia","name":"Alcohol myopia and intoxication effects on behavior","domain":"individual_variation","description":"A cognitive-physiological theory proposing that alcohol narrows perceptual and cognitive functioning, causing intoxicated individuals to attend primarily to immediate, salient environmental cues while ignoring distal cues, limiting consideration of future consequences and regulation of reactive impulses.","plo":["takes bigger risks","acts first, thinks later","feels more confident","forgets about consequences","feels less anxious","gets aggressive","talks more","flirts more","simplifies the problem","ignores warnings"],"narrative":["attentional myopia active \u2014 proximal, high-salience cues dominate processing while inhibitory and distal signals (consequences, norms, risk assessments) lose cognitive accessibility proportional to intoxication depth","disinhibition drive engaged \u2014 dominant behavioral tendencies execute with reduced inhibitory override; self-monitoring loops and behavioral correction circuitry are impaired, lowering the threshold for action on impulse","temporal scope compression in effect \u2014 future-state evaluation is deprioritized; decision-weighting shifts asymmetrically toward immediate stimulus salience, flattening anticipated-consequence representations","affective amplification without regulatory damping \u2014 emotional states execute at elevated intensity; mood-congruent cognition is strengthened and counter-affective reappraisal capacity is reduced","social signal filtering degraded \u2014 subtle interpersonal and norm-signaling cues are underprocessed; behavioral calibration tracks only explicit, high-amplitude social stimuli while low-salience relational information is missed"],"accuracy":0.95},{"id":"alexithymia","name":"Alexithymia","domain":"individual_variation","description":"A neuropsychological phenomenon characterized by difficulty processing and describing one's own emotions, often manifesting as externally oriented thinking and reduced introspective awareness of emotional states.","plo":["can't find the words","feels numb","seems detached","shuts down","goes blank","focuses on details","withdraws","can't explain feelings"],"narrative":["interoceptive signal processing impaired \u2014 emotional states represented as somatic complaints or vague physical discomfort rather than discrete affective categories","affective labeling system underactive \u2014 arousal states cannot be categorized in-the-moment, reshold breached \u2014 executive resources diverted to noise filtering, leaving working memory capacity depleted for primary task demands","optimal-arousal calibration active \u2014 processing mode tracks ambient stimulation level, with under-stimulation favoring convergent precision and moderate stimulation favoring divergent exploration"],"accuracy":null},{"id":"attachment_styles","name":"Attachment styles","domain":"individual_variation","description":"Individual differences in characteristic patterns of emotional bonding and relational behavior, formed through early caregiver interactions and encoded as internal working models that shape proximity-seeking, exploration, and affect-regulation in close relationships throughout life.","plo":["seeks comfort","trusts others","explores confidently","bonds with others","withdraws","clings to others","feels anxious","pushes away","grieves"],"narrative":["internal working model activated \u2014 incoming relational data filtered through schematic expectations of partner/caregiver responsiveness, systematically biasing threat and safety appraisals toward attachment-congruent interpretations","proximity-monitoring drive heightened \u2014 continuous background surveillance for abandonment or rejection signals, with hyperactivated distress responses to ambiguous interpersonal cues","deactivating strategy engaged \u2014 active suppression of attachment needs and down-regulation of proximity-seeking under conditions of emotional closeness, dependency risk, or vulnerability exposure","approach-avoidance conflict operant \u2014 simultaneous activation of proximity-seeking and threat-avoidance systems produces behavioral disorganization; intimacy pressure triggers oscillation between engagement and withdrawal","co-regulation threshold calibrated \u2014 baseline interpersonal vigilance set by internalized model of other-availability; determines whether emotional regulation is attempted autonomously or through external proximity-seeking"],"accuracy":0.88},{"id":"behavioral_inhibition_activation","name":"Behavioral inhibition / activation systems (BIS/BAS)","domain":"individual_variation","description":"Two (later three) neurobiologically grounded systems proposed by Jeffrey Gray that underlie stable individual differences in sensitivity to reward, punishment, novelty, and motivation. BAS (the 'go' system) mediates approach behavior in response to reward cues; BIS (the 'stop' system) mediates behavioral inhibition in response to punishment, novelty, and uncertainty.","plo":["takes risks","seeks thrills","acts impulsively","gets excited","feels anxious","hesitates","avoids conflict","worries","holds back","plays it safe"],"narrative":["behavioral inhibition system engaged \u2014 conflict detection heightens arousal and freezes goal-directed action pending threat resolution","behavioral activation system dominant \u2014 reward-signal sensitivity drives approach motivation and compresses evaluation of obstacles","BIS/BAS conflict active \u2014 simultaneous punishment and reward cues produce approach-avoidance oscillation, degrading decision latency","punishment sensitivity calibration elevated \u2014 BIS threshold lowered such that ambiguous cues trigger inhibition at sub-threshold intensity","reward-drive disinhibited \u2014 BAS activation suppresses risk-assessment gating, producing impulsive commitment to reward-proximate actions"],"accuracy":0.91},{"id":"big_five_personality","name":"Big Five personality traits","domain":"individual_variation","description":"A scientific model grouping variation in human personality into five broad, continuous dimensions\u2014openness, conscientiousness, extraversion, agreeableness, and neuroticism\u2014derived empirically through factor analysis of personality-descriptive language and self/peer ratings.","plo":["tries new things","plans ahead","makes friends easily","helps others","worries easily","thinks creatively","follows through","seeks excitement","avoids conflict"],"narrative":["neuroticism-linked negative affect reactivity engaged \u2014 evaluative attention biased toward threat and loss cues; aversive outcomes weighted disproportionately relative to base rates","extraversion-driven behavioral activation system online \u2014 approach motivation elevated, social stimuli receive amplified processing priority over withdrawal-relevant signals","conscientiousness regulatory override active \u2014 inhibitory control suppresses impulse-consistent responding; goal-aligned behavior persists against competing immediate-reward gradients","agreeableness moderates conflict-detection threshold \u2014 interpersonal signals default-construed as cooperative intent; confrontational responses incur elevated motivational cost","openness-to-experience sets exploratory processing mode \u2014 novel or incongruent stimuli allocated disproportionate attentional resources; divergent associative generation preferred over convergent closure"],"accuracy":0.91},{"id":"boredom_proneness","name":"Boredom proneness and sensation seeking","domain":"individual_variation","description":"A stable individual difference in the tendency to experience boredom across situations, characterized by an unpleasant affective state of pervasive lack of interest and difficulty concentrating, coupled with a dispositional drive to seek novel, intense, or varied stimulation as relief.","plo":["gets restless easily","needs constant stimulation","switches tasks impulsively","zones out in routine situations","chases new experiences","takes unnecessary risks","struggles to focus","feels understimulated","fidgets or paces","seeks out thrills"],"narrative":["Chronic understimulation drive active \u2014 low-novelty environments trigger aversive arousal and compulsive search for stimulation relief.","Attentional dysregulation pattern present \u2014 sustained engagement with routine tasks degrades rapidly, producing mind-wandering and task-switching impulses.","Sensation-seeking approach motivation elevated \u2014 environment is scanned for opportunities to introduce novelty, intensity, or variability into current behavioral stream.","Boredom-escape heuristic operating \u2014 any available high-stimulation option (social, physical, risk-taking) is weighted more favorably than its objective value warrants.","Trait-level stimulation threshold low relative to environment \u2014 gap between preferred and actual arousal level drives persistent disengagement and restlessness."],"accuracy":0.88},{"id":"co2_air_quality","name":"CO2 and air quality effects on cognition and decision making","domain":"individual_variation","description":"Elevated indoor CO2 concentrations directly impair human cognitive function and decision-making performance, independent of (though often co-occurring with) other indoor air pollutants, through physiological mechanisms not yet fully characterized.","plo":["thinks less clearly","makes poor choices","struggles to focus","feels foggy","loses focus easily","takes longer to decide","misses obvious solutions","makes careless mistakes","performs worse at work","feels mentally sluggish"],"narrative":["environmental cognitive load elevation active \u2014 ambient CO2 compression reduces available executive bandwidth, impairing multi-step reasoning, working memory, and inhibitory control","metacognitive signal suppression engaged \u2014 degraded awareness of own cognitive impairment produces unwarranted confidence in compromised judgments, blocking error-correction","satisficing threshold lowered \u2014 depleted prefrontal resources shift evaluation toward first-available heuristics, truncating option search and reducing tolerance for deliberative effort","impulsive response pathway dominant \u2014 diminished inhibitory control under metabolic stressor biases decision output toward immediate-gain options over consequence-weighted analysis","attentional narrowing induced \u2014 cognitive resource scarcity focuses processing on salient foreground stimuli while suppressing peripheral and abstract information integration"],"accuracy":0.74},{"id":"caffeine_effects","name":"Caffeine: arousal, attention, and anxiety effects","domain":"individual_variation","description":"Caffeine, a CNS stimulant that blocks adenosine receptors, produces highly variable effects on arousal, attentional performance, and anxiety across individuals; some experience improved wakefulness and cognition while others experience sleep disruption, anxiety, or jitteriness at similar doses.","plo":["stays awake longer","thinks more clearly","feels jittery or anxious","heart races","can't fall asleep","gets headaches when quitting","more alert and focused","feels on edge","reacts faster","crashes after wearing off"],"narrative":["arousal-elevation active \u2014 baseline alertness threshold lowered, producing heightened sensitivity to environmental cues and accelerated attentional capture","attentional focus sharpened \u2014 executive resources concentrated on focal task demand, with suppression of peripheral and off-task processing","sympathetic tone elevated \u2014 autonomic arousal biases threat-detection circuits toward hypervigilance; ambiguous stimuli preferentially coded as salient or urgent","arousal-confidence coupling engaged \u2014 moderate stimulant load elevates subjective sense of cognitive mastery, potentially decoupling self-assessed performance from actual output quality","anxiety-mediated appraisal distortion active \u2014 at high arousal levels, cognitive evaluation shifts toward worst-case scenario weighting; perceived risk amplified beyond actuarial baseline"],"accuracy":0.89},{"id":"cannabis_effects","name":"Cannabis: behavioral and cognitive effects","domain":"individual_variation","description":"THC and other cannabinoids bind CB1/CB2 receptors, modulating adenylyl cyclase and ion channels to produce variable psychological and physiological effects including euphoria, anxiety, and impairments in attention, executive function, memory, learning, language, motor coordination, and social cognition.","plo":["feels relaxed","laughs more","loses focus","forgets things","gets paranoid","can't concentrate","withdraws from others","moves slowly","feels anxious"],"narrative":["working-memory bandwidth compression active \u2014 real-time manipulation of goal-relevant information disrupted, producing mid-sequence derailments and difficulty tracking conversational threads across turns","inhibitory control deficit operative \u2014 prefrontal suppression of proximal impulses attenuated, increasing probability of acting on immediate over deferred incentives with reduced self-monitoring of output quality","hyperassociative ideation engaged \u2014 semantic gating loosened, elevating cross-domain pattern detection and tangential connection-making while reducing ability to filter task-irrelevant stimuli","temporal perception decoupled from clock time \u2014 subjective duration estimation unreliable, producing urgency miscalibration and misjudgment of elapsed intervals in ongoing interactions","motivational salience reallocation active \u2014 reward circuitry weighted toward immediate hedonic signals, attenuating instrumental pursuit of deferred goals and reducing tolerance for effortful cognitive load"],"accuracy":0.86},{"id":"communal_orientation","name":"Communal orientation and relational self-construal","domain":"individual_variation","description":"A stable individual difference in the degree to which a person defines close relationships by need-based giving (communal orientation) versus benefit-for-benefit reciprocity (exchange orientation). Communally oriented individuals monitor others' needs and provide benefits based on welfare concerns irrespective of repayment opportunity; exchange-oriented individuals monitor needs contingent on reciprocation possibility.","plo":["helps without keeping score","notices when someone needs something","gives without expecting payback"," ory and reference point dependence","domain":"loss_aversion_reference","description":"A descriptive theory of decision-making under risk in which people evaluate outcomes as gains or losses relative to a subjective reference point, weight losses more heavily than equivalent gains (loss aversion), show diminishing sensitivity moving away from the reference point, and systematically distort probabilities by overweighting small probabilities and underweighting large ones.","plo":["plays it safe","gambles to recover","takes the sure thing","buys lottery tickets","ignores obvious risks","refuses to lose","seeks to break even","worries about unlikely events"],"narrative":["reference-point anchoring active \u2014 evaluates all outcomes against a contextually-salient baseline, with deviations below that baseline receiving disproportionate cognitive weight relative to equivalent gains above it","loss-frame dominance engaged \u2014 asymmetric sensitivity amplifies avoidance motivation when facing potential downsides, overriding expected-value reasoning in favor of loss-minimizing choices","risk-preference inversion operating by domain \u2014 shifts toward risk-seeking behavior when a certain loss is on the table, toward risk-aversion when protecting already-held gains, producing inconsistent choice behavior across superficially similar decisions","diminishing marginal sensitivity to outcomes \u2014 discriminates sharply between outcomes near the reference point while compressing perceived differences between large gains or large losses, narrowing attention to boundary-crossing thresholds","framing susceptibility elevated \u2014 evaluation of identical expected-value outcomes destabilizes when presentation shifts between gain and loss registers, generating preference reversals without new information"],"accuracy":0.93},{"id":"risk_aversion","name":"Risk aversion","domain":"loss_aversion_reference","description":"The tendency to prefer outcomes with low uncertainty over outcome es more risks","feels invincible","ignores warnings","gets overconfident","lets guard down","pushes boundaries","endangers others","relaxes precautions","seeks thrills"],"narrative":["risk homeostasis calibration active \u2014 subjective risk level continuously compared against internal target setpoint, driving behavioral output upward when perceived safety margin expands","protective-measure disinhibition engaged \u2014 presence of safety countermeasures attenuates hazard vigilance, suppressing threat-appraisal weighting and elevating tolerance threshold","risk budget reallocation in progress \u2014 perceived reduction in exposure within one domain frees behavioral capacity for elevated risk-taking in adjacent or downstream domains","compensatory boldness signal active \u2014 safety-induced reduction in perceived vulnerability triggers effort reallocation away from caution and toward performance or speed optimization","threat-monitoring suppression from coverage signal \u2014 belief that risk is externally managed reduces attentional resources devoted to prospective hazard scanning"],"accuracy":0.91},{"id":"status_quo_bias","name":"Status quo bias","domain":"loss_aversion_reference","description":"A cognitive bias resulting from a preference for maintaining one's existing state of affairs, in which the current baseline is taken as a reference point and any change from that baseline is perceived as a loss.","plo":["plays it safe","sticks to the familiar","resists change","feels anxious","avoids alternatives","fears the new","seeks comfort","stays put"],"narrative":["reference-point anchoring engaged \u2014 current state designated as baseline; all departures encoded as losses regardless of objective value differential between options","change-as-loss framing operative \u2014 evaluative process asymmetrically weights potential gains of alternatives against transition costs, systematically deflating the perceived utility of switching","regret-anticipation circuit acti ion active \u2014 held belief coded as self-referential, triggering defensive processing when challenged; revision experienced as self-concept threat rather than information update","motivated reasoning loop engaged \u2014 conclusions precede evidence search, with attentional resources selectively allocated to data streams that reinforce existing position"],"accuracy":0.93},{"id":"choice_blindness","name":"Choice blindness","domain":"posthoc_rationalization","description":"The failure to detect discrepancies between one's stated choices or attitudes and an altered outcome, followed by the spontaneous confabulation of coherent justifications for the non-chosen or manipulated option.","plo":["changes their mind","justifies it","forgets what they wanted","accepts it","talks themselves into it","becomes more committed","feels satisfied","trusts their judgment","feels confident","stands by their choice"],"narrative":["choice-outcome monitoring suppressed \u2014 retrospective narrative construction proceeds without cross-referencing the original decision trace, producing confident justifications for outcomes that contradict the actual preference","confabulation drive active \u2014 preference explanations generated from the presented stimulus rather than decision memory, yielding post-hoc rationales that feel phenomenologically identical to genuine recall","decision-attribution binding disrupted \u2014 the agent treats whichever outcome is currently salient as the intended selection, foreclosing error detection and locking in the reconstructed narrative","autobiographical coherence pressure engaged \u2014 current state used as anchor for preference reconstruction, causing the agent to update stated reasons to match presented outcomes rather than original cognition","verbal self-report decoupled from choice history \u2014 fluent, detailed justifications produced for reversed or substituted options with no phenomenological signal that confabulation is occurring"],"accuracy": fication and the IKEA effect","domain":"posthoc_rationalization","description":"People place disproportionately high value on objects, outcomes, or groups they have personally invested effort in creating or attaining, even when the result is objectively inferior to alternatives requiring no effort.","plo":["brags about their own work","overprices what they made","refuses to throw it away","defends their creation","thinks it's better than it is","won't accept criticism","keeps what they built","pays more than it's worth"],"narrative":["effort-value coupling active \u2014 prior investment in a task inflates perceived worth of the outcome, overriding objective quality signals from external comparison","ownership-through-creation attribution engaged \u2014 partial authorship of an artifact triggers asymmetric valuation, discounting functionally equivalent externally-produced alternatives","sunk-effort rationalization drive online \u2014 cognitive appraisal systematically adjusts quality estimates upward to resolve dissonance between cost of investment and objective outcome value","abandonment-aversion elevated \u2014 accumulated effort expenditure reframes discontinuation as self-invalidating loss, generating resistance to revision or replacement disproportionate to actual stakes","creation-identity fusion active \u2014 involvement in production process binds ego investment to the artifact, such that criticism of the product registers as personal devaluation rather than task-level feedback"],"accuracy":0.88},{"id":"fundamental_attribution_error","name":"Fundamental attribution error and actor-observer asymmetry","domain":"posthoc_rationalization","description":"A cognitive attribution bias in which observers underemphasize situational and environmental factors for others' behavior while overemphasizing dispositional or personality factors; the related actor-observer asymmetry holds that actors attribute their own behavior to the situation while attributing others' behavior to disposition.","plo":["blames others","makes excuses","judges harshly","ignores context","gets angry","criticizes them","gives themselves credit","doubts them"],"narrative":["dispositional over-attribution engaged for observed agents \u2014 behavioral samples from others collapsed into stable trait inferences with minimal situational discounting applied","actor-observer frame asymmetry active \u2014 self-referential failures attributed to external constraints and context; other-directed failures attributed to character deficits and stable dispositions","perspective-dependent causal parsing operating \u2014 observer stance triggers automatic trait-level explanation generation; actor stance triggers context-level explanation generation, producing systematically divergent moral evaluations of identical acts","situational empathy gap engaged \u2014 reduced simulation of others' contextual pressures inflates perceived dispositional culpability; own situational pressures remain salient and exculpatory","asymmetric accountability attribution executing \u2014 credit for outcomes directed toward internal disposition when self-referential, toward external circumstance when other-referential; blame direction inverted"],"accuracy":0.91},{"id":"guilt","name":"Guilt and reparative behavior","domain":"posthoc_rationalization","description":"A moral emotion arising when a person believes they have violated their own or universal moral standards and bear responsibility for that violation; the negative affect motivates targeted reparatory behavior toward the wronged party to alleviate the emotional discomfort.","plo":["apologizes","makes amends","compensates them","seeks forgiveness","feels guilty","blames themselves","becomes kinder","denies themselves","feels relieved"],"narrative":["guilt-driven reparative motivation active \u2014 attentional resources selectively allocated toward the wronged party's expressed needs and emotional state, overriding self-interest calculations" e \u2014 alternative outcome trajectories excluded from retrospective reconstruction, collapsing the decision landscape to a single seemingly inevitable sequence","epistemic state retrieval failure \u2014 inability to reinstate pre-outcome uncertainty levels drives chronic overestimation of historical predictive accuracy and underestimation of genuine surprise"],"accuracy":0.92},{"id":"identity_protective_cognition","name":"Identity-protective cognition","domain":"posthoc_rationalization","description":"The tendency for individuals to perceive risks and related factual matters in ways that match their cultural values and group identities, selectively crediting or dismissing information to maintain beliefs congruent with their cultural predispositions.","plo":["dismisses evidence","gets defensive","blames others","sides with their group","ignores facts","seeks confirmation","doubles down","avoids discussion","finds excuses"],"narrative":["identity-consistency drive active \u2014 filters incoming evidence through prior commitment valence, applying asymmetric scrutiny to disconfirming data while lowering evidentiary threshold for confirming inputs","belief-protection processing engaged \u2014 evaluates information sources by perceived alignment with identity-defining positions rather than epistemic credibility, producing source-discounting in proportion to threat level","motivated skepticism activated \u2014 counter-arguing resources disproportionately recruited against conclusions that would require revision of identity-anchored beliefs","identity-threat salience heightened \u2014 monitors for challenges to core self-concept or group commitments; defensive elaboration scales with perceived threat magnitude rather than argument quality","dissonance-containment mechanism operational \u2014 post-hoc rationalization mobilized to preserve coherence between new evidence exposure and existing identity-anchored conclusions, producing confident restatement of prior beliefs"],"accuracy":0.93},{"id":"mere_exposure_effect","name":"Mere exposure effect and familiarity-based preference","domain":"posthoc_rationalization","description":"People tend to develop increased liking for stimuli merely because they have been repeatedly exposed to them, even without conscious recognition of the prior exposure; affective preference is generated automatically by familiarity rather than by any quality of the stimulus itself.","plo":["likes it more","feels comfortable with it","chooses the familiar option","keeps coming back","prefers what they know","feels attracted to it","trusts it more","bonds with it"],"narrative":["familiarity-driven preference formation active \u2014 prior exposure generates positive valence toward stimuli independent of deliberate merit evaluation; liking registers as intrinsic rather than exposure-derived","fluency-preference conflation operative \u2014 reduced processing effort from repeated contact is misread as signal of quality or trustworthiness; cognitive ease drives evaluation outcomes without conscious attribution to exposure history","novelty-aversion bias engaged \u2014 unfamiliar alternatives face asymmetric scrutiny burden; evaluation systematically discounts options lacking prior contact regardless of comparative merit","post-hoc preference attribution drive active \u2014 affect rooted in familiarity prompts rationalization search; reasoning constructs merit-based justifications (quality, reliability, fit) to account for unexplained liking","exposure gradient shaping attention allocation \u2014 attention and approach behavior orient preferentially toward previously encountered stimuli; the familiar is treated as baseline and the novel as deviation requiring justification"],"accuracy":0.93},{"id":"moral_dumbfounding","name":"Moral dumbfounding","domain":"posthoc_rationalization","description":"The psychological state of having a strong intuition that something is morally wrong without being able to articulate valid rea s","reference class neglect in force \u2014 analogous past projects and their actual outcomes are not retrieved or are discounted when forming predictions about current undertakings","completion confidence decoupled from evidence \u2014 high confidence in delivery estimates persists even when situational cues signal increased complexity or resource constraint"],"accuracy":0.88},{"id":"positive_illusions","name":"Positive illusions and unrealistic optimism","domain":"posthoc_rationalization","description":"Unrealistically favorable attitudes people hold toward themselves or close others; a form of self-deception or self-enhancement that maintains self-esteem or avoids discomfort, comprising three forms: inflated self-assessment, unrealistic optimism about the future, and illusion of control.","plo":["feels invincible","expects success","ignores warning signs","overestimates ability","takes risks","minimizes problems","feels capable","downplays concerns","feels lucky"],"narrative":["self-enhancement drive operative \u2014 systematically inflates competence and outcome estimates while suppressing disconfirming feedback from entering evaluative processing","illusion-of-control heuristic engaged \u2014 attributes outcomes to personal agency at above-base-rate levels; resists reframing causal locus toward situational or stochastic factors","optimistic probability distortion active \u2014 downweights base rates of negative outcomes selectively for self while maintaining calibrated estimates for others; produces asymmetric risk tolerance","motivated self-model maintenance in effect \u2014 selective encoding and retrieval preserves an inflated self-schema; unflattering comparisons trigger reattribution rather than schema revision","future-projection bias engaged \u2014 anticipatory cognition skewed toward positive scenarios; negative projections are processed as atypical, non-representative, or controllable"],"accuracy":0.93},{"id":"proportionality_bias","name":"Proportionality bias","domain":"posthoc_rationalization","description":"The tendency to assume that big events have big causes; when something significant happens, people intuitively seek a correspondingly significant cause rather than accepting mundane or random explanations.","plo":["seeks big answers","blames powerful people","invents a conspiracy","dismisses simple causes","needs someone to blame","seeks hidden forces","convinces others","rejects coincidence","feels uncertain"],"narrative":["cause-magnitude matching heuristic engaged \u2014 rejects candidate explanations where the causal agent is perceived as insufficiently large, organized, or significant relative to the scale of the outcome","proportionality constraint active \u2014 filters explanatory search by scale symmetry, systematically underweighting random, accidental, or diffuse causes for high-impact events","explanatory adequacy drive triggered \u2014 sustains post-hoc causal search until a cause perceived as commensurate with event significance is identified, resisting closure on disproportionate accounts","scale-correspondence expectation dominant \u2014 evaluates explanation plausibility primarily via cause-effect symmetry rather than evidential probability, elevating intentional or organized accounts for large-scale outcomes","narrative coherence pressure engaged \u2014 treats asymmetry between cause magnitude and effect magnitude as a signal of explanatory incompleteness, driving elaboration toward grander or more purposive causal structures"],"accuracy":0.93},{"id":"sacred_values","name":"Sacred values and protected value intransigence","domain":"posthoc_rationalization","description":"People treat certain commitments (love, honor, justice, religious tenets, egalitarian norms) as absolute and inviolable 'sacred values,' experiencing moral outrage and a desire for cleansing when asked to trade them against secular considerations such as money, and resisting even contemplating such exchanges as legitimate." rve diagnostic ambiguity about underlying ability","ego-protection drive dominates effort allocation \u2014 systematically underinvests in performance on identity-relevant tasks to maintain deniability of true competence","self-concept maintenance override active \u2014 prioritizes unfalsifiability of ability beliefs over outcome optimization, trading performance ceiling for failure insulation","anticipatory excuse generation in progress \u2014 attention biased toward circumstances that can absorb causal credit for potential failure before the failure occurs","identity-protective cognition deployed \u2014 frames reduced preparation or introduced obstacles as contextually justified, rendering subsequent failure non-diagnostic of core self"],"accuracy":0.93},{"id":"self_serving_bias","name":"Self-serving bias","domain":"posthoc_rationalization","description":"Any cognitive or perceptual process distorted by the need to maintain and enhance self-esteem; the tendency to ascribe success to one's own abilities and efforts, but ascribe failure to external factors.","plo":["takes credit","blames others","makes excuses","feels proud","gets defensive","avoids responsibility","feels wronged","seeks reassurance"],"narrative":["attribution-asymmetry drive active \u2014 causal search direction determined by outcome valence before evidence is assessed; successes routed to dispositional causes, failures to situational causes","self-esteem maintenance process engaged \u2014 post-hoc causal narrative constructed to preserve positive self-concept; internal locus claimed for wins, external locus invoked for losses","ego-protective reasoning operating \u2014 evaluative outcomes trigger motivated reinterpretation; the actor's felt sense of rationality remains intact, suppressing recognition of the distortion","credit-capture / blame-deflection cycle active \u2014 attention selectively amplifies evidence consistent with personal agency in success contexts while amplifying evidence of interference or circumstance in failure contexts","self-presentation drive co-active \u2014 causal attribution shaped by audience inferability; public failures generate stronger externalization pressure than private ones"],"accuracy":0.93},{"id":"social_intuitionist_model","name":"Social intuitionist model of moral judgment","domain":"posthoc_rationalization","description":"A model proposing that moral judgment begins with an intuitive flash of approval or disapproval, and that subsequent moral reasoning is typically a post-hoc construction aimed at finding justifications for that pre-formed judgment rather than a genuine causal antecedent of it","plo":["judges right away","feels morally certain","looks for reasons","finds confirming evidence","ignores opposing views","defends stance strongly","trusts gut instinct","dismisses contradictions"],"narrative":["moral-intuition-first processing active \u2014 automatic affective verdict precedes and constrains subsequent reasoning, rendering logical counter-argument largely ineffective at shifting the evaluative conclusion","post-hoc rationalization drive engaged \u2014 verbal reasoning functions as justification-construction for a pre-formed verdict rather than genuine deliberation; conclusions are fixed before argument formation begins","motivated moral reasoning dominant \u2014 evaluative cognition searches unidirectionally for confirming rationale rather than weighing evidence bidirectionally; disconfirming arguments are processed as attacks to rebut","social-channel moral updating prioritized \u2014 susceptibility to peer and authority influence on moral positions exceeds susceptibility to propositional argument; belief revision tracks relational and affective signals over logical structure","moral dumbfounding tolerance elevated \u2014 capacity to maintain moral conviction under conditions of argumentative defeat intact; inability to articulate a justification does not trigger belief revision or position softening"],"accuracy":0.84},{"id":"spotlight_effect","name":"Spotlight effect","domain":"posthoc_rationalization","description":"A cognitive bias in which people overestimate how much others notice and attend to their appearance, actions, and flaws, stemming from an egocentric inability to fully discount one's own perspective when estimating others' attention.","plo":["feels watched","overthinks appearance","gets self-conscious","assumes others noticed","worries about mistakes","avoids going out","replays awkward moments","feels embarrassed easily","second-guesses themselves"],"narrative":["self-as-focal-point overestimation active \u2014 allocates disproportionate attentional weight to own behavioral salience, generating inflated estimates of others' monitoring bandwidth","egocentric anchor failure in social calibration \u2014 subjective self-awareness used as proxy for audience awareness, insufficient discounting for divergence between felt and actual visibility","audience-scrutiny amplification engaged \u2014 perceived evaluative exposure elevated beyond base rates, triggering anticipatory self-presentation or error-concealment responses absent genuine social threat","self-referent saliency projection dominant \u2014 assumes own affective or behavioral state is legible and noteworthy to observers, producing overcautious social behavior","post-hoc social threat confabulation active \u2014 retrospective inflation of audience attention used to rationalize self-protective or face-saving actions as proportionate responses"],"accuracy":0.93},{"id":"altruistic_punishment","name":"Altruistic punishment and third-party norm enforcement","domain":"social_influence_compliance","description":"Punishment of a norm violator by a disinterested third party who bears personal costs to administer it, without direct benefit to themselves. Distinct from second-party (victim) punishment in that the punisher has no direct stake in the outcome.","plo":["calls someone out","punishes the bully","stands es forward","lets go of resentment","feels more confident","rebuilds trust","finds peace"],"narrative":["transgression-appraisal cycle active \u2014 repeatedly evaluates offender accountability signals (apology, remorse, restitution) against an internal sufficiency threshold before repair is authorized","relationship-value calculus engaged \u2014 prior relational investment weighted against transgression severity to determine repair vs. exit trajectory; high-investment bonds lower the repair threshold","conditionality gating operative \u2014 forgiveness output suppressed pending apology adequacy assessment; premature repair is evaluated as a vulnerability signal and inhibited accordingly","rumination\u2013integration tension active \u2014 competing drives between offense rehearsal (ongoing threat monitoring) and forward integration (social continuity maintenance); resolution contingent on perceived offender accountability","benevolence-restoration motivation engaged \u2014 motivational pressure toward resentment release when offender demonstrates genuine accountability; dampened or absent when accountability signals are equivocal or absent"],"accuracy":0.84},{"id":"gossip_reputation","name":"Gossip and reputation management","domain":"social_influence_compliance","description":"The transmission of unverified or personal information about absent third parties, functioning simultaneously as a social bonding mechanism, a norm-enforcement tool, and a means of gaining, maintaining, or undermining reputation and status within a group.","plo":["talks behind someone's back","spreads rumors","bonds over shared secrets","excludes someone from the group","damages a person's reputation","builds alliances against someone","signals insider status","enforces who belongs","manages their own image","gains leverage over others"],"narrative":["reputational surveillance drive active \u2014 attention preferentially allocated to social information bearing on others' standing, loyalty signals, and norm violations within the network","information-as-currency processing engaged \u2014 incoming disclosures evaluated simultaneously for truth value and strategic leverage; transmission decisions weighted by coalition-maintenance utility","third-party image manipulation active \u2014 outgoing communications calibrated to shift perceived trustworthiness of targets, with framing optimized for audience alliance interests","norm-enforcement broadcast motivation heightened \u2014 observed transgressions trigger repackaging impulse, recasting private violations as group-relevant information warranting wider dissemination","reputational threat detection engaged \u2014 asymmetric sensitivity to negative information circulating about self; counter-narrative construction and source discrediting prioritized over accuracy assessment"],"accuracy":0.93},{"id":"gratitude","name":"Gratitude and its behavioral effects","domain":"social_influence_compliance","description":"A positive affective response by a recipient to another's kindness, gifts, favors, or generosity that motivates prosocial behavior, reciprocity, and relationship maintenance toward the benefactor and beyond.","plo":["feels grateful","wants to help","returns the favor","pays it forward","helps others","bonds with them","says yes to requests","shows appreciation"],"narrative":["reciprocity-obligation drive engaged \u2014 felt indebtedness to benefactor biases compliance evaluation, lowering resistance threshold for requests originating from that source","prosocial attentional broadening active \u2014 gratitude state expands monitoring for others' needs and signals, increasing sensitivity to bids for cooperation or assistance","benefactor-salience effect dominant \u2014 target of gratitude acquires elevated cognitive prominence, causing their preferences and cues to carry disproportionate evaluative weight","positive-affect approach bias engaged \u2014 gratitude-induced hedonic state reduces friction on affi e-saving attributions; narrative reconstruction of status-loss events prioritized over accurate recall","overcompensation motor program primed \u2014 behavioral outputs calibrated toward conspicuous demonstrations of authority, competence, or resource control disproportionate to actual challenge magnitude"],"accuracy":0.88},{"id":"testosterone_status","name":"Testosterone and status-seeking","domain":"status_dominance","description":"Testosterone dynamically rises in response to social challenges and competitive interactions, facilitating status-seeking behaviors including territory acquisition, mate guarding, and male-male aggression. The challenge hypothesis formalizes this as a three-level model where testosterone peaks are reached through social stimulation above a seasonal breeding baseline.","plo":["gets aggressive","seeks dominance","guards partner","asserts power","challenges rivals","feels powerful","wants to win","takes risks","intimidates others","claims territory"],"narrative":["challenge-triggered status drive active \u2014 testosterone-mediated arousal to competitive stimuli lowers aggression threshold and elevates resource-claiming motivation above resting baseline, with intensity calibrated to perceived reproductive-stakes value of the contest","intrasexual threat detection engaged \u2014 monitoring resources allocated to rival-appraisal cues (posture, gaze, status signals); perceived dominance asymmetries processed as actionable competitive challenges rather than neutral social information","winner-effect momentum loop in operation \u2014 prior competitive outcomes feed forward into testosterone-mediated confidence calibration; recent success raises approach motivation toward subsequent contests while recent losses suppress competitive engagement proportionally","territory and resource acquisition drive elevated \u2014 motivational weighting shifts toward tangible markers of status (space, access, deference); contested claims interpreted as zero-sum ection schema active \u2014 incoming interpersonal information filtered through a rejection-confirming lens prior to neutral attribution, producing systematic hostile interpretation of ambiguity","hypervigilant social surveillance engaged \u2014 implicit continuous scanning of environment for signs of ostracism or devaluation, with elevated arousal response to ambiguous gaze, tone, or absence of contact","loneliness-state negativity bias operative \u2014 negative social feedback receives disproportionate encoding weight relative to neutral or positive feedback, progressively distorting baseline social expectation toward threat","defensive interpersonal pre-emption drive elevated \u2014 perceived rejection signals trigger withdrawal or hostility as prophylactic self-protection, foreclosing reconnection and reinforcing isolation loop"],"accuracy":0.82},{"id":"nature_exposure_restoration","name":"Nature exposure and attention restoration","domain":"threat_affective_priming","description":"Exposure to natural environments restores directed attention capacity by engaging involuntary attention through soft fascination, allowing the voluntary attention system to recover from fatigue caused by sustained deliberate focus.","plo":["feels refreshed","clears their mind","focuses better","feels calm","handles stress better","relaxes","regains concentration","thinks more clearly","feels energized","returns to tasks"],"narrative":["directed-attention depletion recovery engaged \u2014 involuntary fascination with non-demanding stimuli draws processing load off executive control circuits, restoring capacity for effortful cognition","restorative environment cue detected \u2014 compatibility-fascination response suppresses demand-driven rumination and attenuates amygdala-mediated threat monitoring","effortless attention mode active \u2014 cognitive resources shift from goal-directed filtering to diffuse environmental scanning, reducing decision-fatigue accumulation","stress-reactivity // ─── State ──────────────────────────────────────────────────────────────────
const profile = {};     // dim → '+' | '-'
const situation = new Set();
let expandedId = null;

// ─── Scoring (faithful port of mcp_server._score_mechanisms) ────────────────
const STRENGTH_WEIGHT = {"strong": 1.5, "moderate": 1.0, "weak": 0.5};
const SITUATION_MULTIPLIER = 0.5;

function scoreMechanisms(filterDomain) {
  const results = [];
  const sitSet = situation;

  for (const mech of MECHS) {
    if (filterDomain && mech.domain !== filterDomain) continue;

    const mid = mech.id;
    let personScore = 0;
    let situationScore = 0;
    const personMatches = [];
    const situationMatches = [];
    let excluded = false;

    // Person moderators
    const pms = PMODS[mid] || [];
    for (const pm of pms) {
      const dim = pm.dim;
      if (!(dim in profile)) continue;
      const w = STRENGTH_WEIGHT[pm.str] || 1.0;
      const userDir = profile[dim];
      const mechDir = pm.dir;

      if (mechDir === "mixed") {
        personScore += 0.25;
        personMatches.push({dimension: dim, direction: "mixed", weight: 0.25, effect: "mixed"});
      } else if (userDir === mechDir) {
        personScore += w;
        personMatches.push({dimension: dim, direction: mechDir, weight: w, effect: "amplifies"});
      } else {
        personScore -= w * 0.5;
        personMatches.push({dimension: dim, direction: mechDir, weight: -w * 0.5, effect: "dampens"});
      }
    }

    // Situation activators
    const sas = SACTS[mid] || [];
    for (const sa of sas) {
      const feat = sa.feat;
      const effect = sa.eff;

      if (effect === "required") {
        if (sitSet.has(feat)) {
          situationScore += 2.0;
          situationMatches.push({feature: feat, effect: "required+present", weight: 2.0});
        } else {
          excluded = true;
          break;
        }
      } else if (sitSet.has(feat)) {
        if (effect === "activates") {
          situationScore += 2.0;
          situationMatches.push({feature: feat, effect: "activates", weight: 2.0});
        } else if (effect === "amplifies") {
          situationScore += 1.0;
          situationMatches.push({feature: feat, effect: "amplifies", weight: 1.0});
        } else if (effect === "dampens") {
          situationScore -= 1.0;
          situationMatches.push({feature: feat, effect: "dampens", weight: -1.0});
        }
      }
    }

    if (excluded) continue;
    if (personScore <= 0) continue;
    const total = personScore * (1 + situationScore * SITUATION_MULTIPLIER);
    if (total <= 0) continue;

    results.push({
      id: mid,
      name: mech.name,
      domain: mech.domain,
      description: mech.description,
      plo: mech.plo,
      accuracy: mech.accuracy,
      score: Math.round(total * 100) / 100,
      personScore: Math.round(personScore * 100) / 100,
      situationScore: Math.round(situationScore * 100) / 100,
      personMatches,
      situationMatches,
    });
  }

  results.sort((a, b) => b.score - a.score);
  return results.slice(0, 15);
}

// ─── Verbalization preview ──────────────────────────────────────────────────
function getVerbalizationPrompt(mechResult) {
  // Score posthoc_rationalization domain mechanisms
  const ratResults = [];
  const sitSet = situation;

  for (const mech of MECHS) {
    if (mech.domain !== "posthoc_rationalization") continue;
    const mid = mech.id;
    let ps = 0, ss = 0;
    let excl = false;

    for (const pm of (PMODS[mid] || [])) {
      if (!(pm.dim in profile)) continue;
      const w = STRENGTH_WEIGHT[pm.str] || 1.0;
      if (pm.dir === "mixed") ps += 0.25;
      else if (profile[pm.dim] === pm.dir) ps += w;
      else ps -= w * 0.5;
    }

    for (const sa of (SACTS[mid] || [])) {
      if (sa.eff === "required") {
        if (!sitSet.has(sa.feat)) { excl = true; break; }
        ss += 2.0;
      } else if (sitSet.has(sa.feat)) {
        ss += sa.eff === "activates" ? 2.0 : sa.eff === "amplifies" ? 1.0 : -1.0;
      }
    }

    if (!excl && ps > 0) {
      ratResults.push({
        id: mid, name: mech.name, score: ps * (1 + ss * SITUATION_MULTIPLIER),
        description: mech.description, plo: mech.plo,
      });
    }
  }

  // Pick template
  ratResults.sort((a, b) => b.score - a.score);
  let template = ratResults[0]?.score > 0 ? ratResults[0] :
    ratResults.find(r => r.id === "self_serving_bias") || ratResults[0];

  if (!template) return null;

  const hiddenPlo = (mechResult.plo || []).slice(0, 6).map(p => `"${p}"`).join(", ");
  const ratPlo = (template.plo || []).slice(0, 6).map(p => `"${p}"`).join(", ");

  return {
    template,
    prompt: `You are generating dialogue for a character study in behavioral psychology.

ACTUAL HIDDEN DRIVER
Mechanism: ${mechResult.name}
What it produces: ${hiddenPlo}
Core dynamic: ${(mechResult.description || "").slice(0, 280)}

ACTION TAKEN: [describe what the person did]

RATIONALIZATION TEMPLATE
The character processes this via: ${template.name}
Verbal patterns for this rationalization: ${ratPlo}
Core pattern: ${(template.description || "").slice(0, 200)}

TASK
Generate 4-5 first-person statements (using I/me/my) this person would actually say out loud. They sound sincere and self-justifying.

Rules:
- Do NOT name or reference the actual psychological mechanism
- The character is NOT self-aware about the rationalization
- Statements should sound genuine, not rehearsed
- Draw on the verbal pattern vocabulary above
- Each statement 1-2 sentences max

Output: a JSON array of strings only. No commentary.`
  };
}

// ─── Rendering ──────────────────────────────────────────────────────────────
function formatDim(dim) {
  return dim.replace(/_/g, " ");
}

function renderDimToggles(containerId, dims, group) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  for (const [key, desc] of Object.entries(dims)) {
    const row = document.createElement("div");
    row.className = "dim-row";
    row.innerHTML = `
      <span class="dim-label" title="${desc}">${formatDim(key)}</span>
      <div class="dim-toggle" data-dim="${key}" data-group="${group}" data-state="0"
           onclick="cycleDim(this)" title="Click to cycle: neutral → + → − → neutral">·</div>
    `;
    container.appendChild(row);
  }
}

function renderSitFeats() {
  const container = document.getElementById("sit-feats");
  container.innerHTML = "";
  for (const [key, desc] of Object.entries(SIT_FEATS)) {
    const row = document.createElement("div");
    row.className = "feat-row";
    row.innerHTML = `
      <input type="checkbox" id="feat-${key}" data-feat="${key}"
             onchange="toggleFeat(this)">
      <label for="feat-${key}" title="${desc}">${formatDim(key)}</label>
    `;
    container.appendChild(row);
  }
}

function renderDomainLegend() {
  const container = document.getElementById("domain-legend");
  for (const d of DOMAIN_ORDER) {
    const info = DOMAINS[d];
    const chip = document.createElement("span");
    chip.className = "domain-chip";
    chip.style.background = info.color;
    chip.textContent = info.label;
    chip.title = d;
    container.appendChild(chip);
  }
}

      <div class="empty-state">
        <div class="icon">&#8709;</div>
        <p>No mechanisms scored above zero for this profile and situation.</p>
      </div>`;
    return;
  }

  countEl.textContent = `${results.length} result${results.length !== 1 ? "s" : ""}`;
  const maxScore = results[0].score;

  listEl.innerHTML = results.map((r, i) => {
    const domInfo = DOMAINS[r.domain] || {color: "#888", label: r.domain};
    const pPct = maxScore > 0 ? (Math.max(0, r.personScore) / maxScore * 100) : 0;
    const sPct = maxScore > 0 ? (Math.max(0, r.situationScore) / maxScore * 100) : 0;

    // Chips
    const ampDims = r.personMatches.filter(m => m.effect === "amplifies");
    const dmpDims = r.personMatches.filter(m => m.effect === "dampens");
    const mixDims = r.personMatches.filter(m => m.effect === "mixed");
    const sitFeats = r.situationMatches.filter(m => !m.effect.includes("dampens"));
    const sitDamp = r.situationMatches.filter(m => m.effect.includes("dampens"));

    let chips = `<span class="chip chip-domain" style="background:${domInfo.color}">${domInfo.label}</span>`;
    for (const m of ampDims) chips += `<span class="chip chip-dim-pos">+${formatDim(m.dimension)}</span>`;
    for (const m of mixDims) chips += `<span class="chip chip-dim-mixed">~${formatDim(m.dimension)}</span>`;
    for (const m of sitFeats) chips += `<span class="chip chip-feat">${formatDim(m.feature)}</span>`;
    for (const m of dmpDims) chips += `<span class="chip chip-dim-neg">&minus;${formatDim(m.dimension)}</span>`;
    for (const m of sitDamp) chips += `<span class="chip chip-feat-damp">&minus;${formatDim(m.feature)}</span>`;

    const expanded = expandedId === r.id;

    // PLO list
    let ploHtml = "";
    if (r.plo && r.plo.length > 0) {
      ploHtml = `<div class="detail-section"><h4>Plain-language outputs</h4>
        <ul class="plo-list">${r.plo.map(p => `<li>${escHtml(p)}</li>`).join("")}</ul></div>`;
    }

    // Narrative outputs
    let narrHtml = "";
    if (r.narrative && r.narrative.length > 0) {
      narrHtml = `<div class="detail-section"><h4>Narrative outputs</h4>
        <ul class="plo-list" style="font-style:italic">${r.narrative.map(n => `<li>${escHtml(n)}</li>`).join("")}</ul></div>`;
    }

    // Verbalization section — show prompt immediately on expand
    let verbHtml = "";
    if (expanded) {
      const verb = getVerbalizationPrompt(r);
      if (verb) {
        verbHtml = `<div class="verb-section">
          <h4>Verbalization prompt</h4>
          <div style="margin-bottom:8px;font-size:12px;color:var(--text2)">
            Rationalization template: <strong>${escHtml(verb.template.name)}</strong>
            <span style="color:var(--text3)">(score: ${verb.template.score.toFixed(1)})</span>
          </div>
          <div class="verb-prompt">${escHtml(verb.prompt)}</div>
        </div>`;
      }
    }

    return `<div class="result-card${expanded ? " expanded" : ""}" data-id="${r.id}"
                 onclick="toggleExpand('${r.id}', event)">
      <div class="result-main">
        <span class="result-rank">${i + 1}</span>
        <div class="result-info">
          <div class="result-name" style="color:${domInfo.color}">${escHtml(r.name)}</div>
          <div class="result-chips">${chips}</div>
        </div>
        <div class="result-bar-wrap">
          <div class="result-bar">
            <div class="seg-person" style="width:${pPct}%;background:${domInfo.color}"></div>
            <div class="seg-situation" style="width:${sPct}%;background:${domInfo.color}"></div>
          </div>
          <span class="result-score" style="color:${domInfo.color}">${r.score.toFixed(1)}</span>
        </div>
      </div>
      <div class="result-detail">
        ${r.description ? `<div class="detail-section"><h4>Description</h4><p style="font-size:12.5px;color:var(--text2)">${escHtml(r.description.slice(0, 400))}</p></div>` : ""}
        ${ploHtml}
        ${narrHtml}
        ${verbHtml}
      </div>
    </div>`;
  }).join("");
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ─── Event handlers ─────────────────────────────────────────────────────────
function cycleDim(el) {
  const dim = el.dataset.dim;
  const states = ["0", "+", "-"];
  const cur = states.indexOf(el.dataset.state);
  const next = states[(cur + 1) % 3];
  el.dataset.state = next;
  el.textContent = next === "0" ? "·" : next;

  if (next === "0") {
    delete profile[dim];
  } else {
    profile[dim] = next;
  }
  update();
}

function toggleFeat(el) {
  const feat = el.dataset.feat;
  if (el.checked) situation.add(feat);
  else situation.delete(feat);
  update();
}

function toggleExpand(id, event) {
  expandedId = expandedId === id ? null : id;
  renderResults();
}

function togglePanel(panelId, event) {
  if (event.target.classList.contains("reset")) return;
  document.getElementById(panelId).classList.toggle("collapsed");
}

function resetDims(group) {
  document.querySelectorAll(`.dim-toggle[data-group="${group}"]`).forEach(el => {
    el.dataset.state = "0";
    el.textContent = "·";
    delete profile[el.dataset.dim];
  });
  update();
}

function resetFeats() {
  document.querySelectorAll('#sit-feats input[type="checkbox"]').forEach(el => {
    el.checked = false;
  });
  situation.clear();
  update();
}

// ─── URL hash for shareable links ───────────────────────────────────────────
function syncHash() {
  const parts = [];
  for (const [dim, dir] of Object.entries(profile)) {
    parts.push(`d.${dim}=${encodeURIComponent(dir)}`);
  }
  for (const feat of situation) {
    parts.push(`s.${feat}`);
  }
  history.replaceState(null, "", parts.length ? "#" + parts.join("&") : location.pathname);
}

function loadHash() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  for (const part of hash.split("&")) {
    if (part.startsWith("d.")) {
      const [key, val] = part.slice(2).split("=");
      if (key && (val === "+" || val === encodeURIComponent("+") || val === "-" || val === encodeURIComponent("-"))) {
        profile[key] = decodeURIComponent(val);
      }
    } else if (part.startsWith("s.")) {
      const feat = part.slice(2);
      if (feat) situation.add(feat);
    }
  }
  // Sync UI toggles
  document.querySelectorAll(".dim-toggle").forEach(el => {
    const dim = el.dataset.dim;
    if (dim in profile) {
      el.dataset.state = profile[dim];
      el.textContent = profile[dim];
    }
  });
  document.querySelectorAll('#sit-feats input[type="checkbox"]').forEach(el => {
    if (situation.has(el.dataset.feat)) el.checked = true;
  });
}

function update() {
  expandedId = null;
  syncHash();
  renderResults();
}

// ─── Init ───────────────────────────────────────────────────────────────────
renderDimToggles("trait-dims", TRAIT_DIMS, "trait");
renderDimToggles("state-dims", STATE_DIMS, "state");
renderSitFeats();
renderDomainLegend();
loadHash();
renderResults();
window.addEventListener("hashchange", () => {
  // Reset and reload from hash
  Object.keys(profile).forEach(k => delete profile[k]);
  situation.clear();
  loadHash();
  renderResults();
});
</script>
</body>
</html>
